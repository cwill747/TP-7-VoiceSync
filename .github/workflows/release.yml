name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Full history needed for commit count

      - name: Extract version info
        id: version
        run: |
          # Marketing version from tag (strip 'v' prefix)
          TAG=${GITHUB_REF#refs/tags/v}
          echo "MARKETING_VERSION=$TAG" >> $GITHUB_OUTPUT
          
          # Build number = total commit count (always increasing integer)
          BUILD_NUMBER=$(git rev-list HEAD --count)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          
          echo "Marketing Version: $TAG"
          echo "Build Number: $BUILD_NUMBER"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26'

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, sign, package, and notarize
        env:
          PROJECT_NAME: TeenageEngVoiceSync
          APP_BUNDLE_NAME: "TP-7 VoiceSync"
          DMG_BASENAME: TP-7-VoiceSync
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_DIR="build"
          mkdir -p "$BUILD_DIR"

          # Resolve signing identity from the imported Developer ID certificate
          SIGNING_IDENTITY="$(
            security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db" | \
            grep 'Developer ID Application:' | \
            head -1 | \
            sed -E 's/.*"(Developer ID Application:[^"]+)".*/\1/'
          )"
          
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "ERROR: Could not find Developer ID Application certificate in keychain"
            security find-identity -v -p codesigning "$RUNNER_TEMP/signing.keychain-db"
            exit 1
          fi
          echo "Using signing identity: $SIGNING_IDENTITY"

          echo "Building libtp7mtp.dylib from source..."
          CODESIGN_IDENTITY="$SIGNING_IDENTITY" nix develop --command ./scripts/build-tp7mtp.sh

          echo "Building archive..."
          xcodebuild -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -derivedDataPath "$BUILD_DIR/DerivedData" \
            -archivePath "$BUILD_DIR/$PROJECT_NAME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="${{ steps.version.outputs.MARKETING_VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.BUILD_NUMBER }}" \
            archive

          echo "Exporting archive..."
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>method</key>' \
            '    <string>developer-id</string>' \
            '    <key>teamID</key>' \
            "    <string>$APPLE_TEAM_ID</string>" \
            '    <key>signingStyle</key>' \
            '    <string>manual</string>' \
            '    <key>signingCertificate</key>' \
            '    <string>Developer ID Application</string>' \
            '</dict>' \
            '</plist>' > "$BUILD_DIR/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$BUILD_DIR/$PROJECT_NAME.xcarchive" \
            -exportPath "$BUILD_DIR/Export" \
            -exportOptionsPlist "$BUILD_DIR/ExportOptions.plist"

          APP_PATH="$BUILD_DIR/Export/$APP_BUNDLE_NAME.app"

          echo "Verifying code signature..."
          codesign --verify -vvv --strict "$APP_PATH"
          spctl -a -vvv "$APP_PATH" || true

          DMG_NAME="${DMG_BASENAME}-${{ steps.version.outputs.MARKETING_VERSION }}.dmg"
          DMG_PATH="$BUILD_DIR/$DMG_NAME"

          echo "Creating DMG..."
          TEMP_DIR="$(mktemp -d)"
          DMG_TEMP="$TEMP_DIR/dmg"
          mkdir -p "$DMG_TEMP"
          cp -R "$APP_PATH" "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          rm -f "$DMG_PATH"
          hdiutil create -volname "$APP_BUNDLE_NAME" -srcfolder "$DMG_TEMP" -ov -format UDZO "$DMG_PATH"
          rm -rf "$TEMP_DIR"

          echo "Signing DMG..."
          codesign --force --sign "$SIGNING_IDENTITY" "$DMG_PATH"

          if [[ -z "${APPLE_ID:-}" ]] || [[ -z "${APPLE_ID_PASSWORD:-}" ]]; then
            echo "ERROR: APPLE_ID/APPLE_ID_PASSWORD not set; refusing to publish an un-notarized DMG." >&2
            echo "Set the notarization secrets, or intentionally relax this check if you accept Gatekeeper warnings." >&2
            exit 1
          fi

          echo "Submitting for notarization (Apple ID)..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

          echo "Verifying notarization..."
          spctl -a -vvv --type install "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: TP-7 VoiceSync v${{ steps.version.outputs.MARKETING_VERSION }}
          draft: false
          prerelease: false
          files: |
            build/TP-7-VoiceSync-*.dmg
          body: |
            ## Installation

            1. Download the DMG file below
            2. Open the DMG and drag TP-7 VoiceSync to your Applications folder
            3. Launch TP-7 VoiceSync from Applications

            **Note:** On first launch, you may need to right-click and select "Open" to bypass Gatekeeper.

            ## Requirements
            - macOS 26.0 (Tahoe) or later on Apple Silicon (Intel Macs are not supported)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
