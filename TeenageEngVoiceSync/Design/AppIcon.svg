<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f4f2"/>
      <stop offset="0.52" stop-color="#cfcfcb"/>
      <stop offset="1" stop-color="#9f9f9a"/>
    </linearGradient>
    <linearGradient id="button" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eeeeeb"/>
      <stop offset="1" stop-color="#b5b5b0"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="inner" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#050607"/>
  <rect x="72" y="72" width="880" height="880" rx="168" fill="#111315"/>

  <g filter="url(#soft-shadow)">
    <circle cx="512" cy="382" r="255" fill="url(#metal)"/>
    <circle cx="512" cy="382" r="246" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4"/>

    <g fill="#111315" filter="url(#inner)">
      <rect x="330" y="370" width="31" height="86" rx="15.5"/>
      <rect x="384" y="333" width="34" height="160" rx="17"/>
      <rect x="440" y="288" width="37" height="250" rx="18.5"/>
      <rect x="496" y="235" width="40" height="344" rx="20"/>
      <rect x="551" y="288" width="37" height="250" rx="18.5"/>
      <rect x="606" y="333" width="34" height="160" rx="17"/>
      <rect x="663" y="370" width="31" height="86" rx="15.5"/>
    </g>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="198" y="690" width="199" height="178" rx="18" fill="url(#button)"/>
    <rect x="402" y="690" width="220" height="178" rx="10" fill="url(#button)"/>
    <rect x="627" y="690" width="199" height="178" rx="18" fill="url(#button)"/>

    <circle cx="297" cy="779" r="31" fill="#df311a"/>
    <circle cx="297" cy="779" r="33" fill="none" stroke="#2c2d2d" stroke-width="4"/>

    <path d="M492 742 L492 816 Q492 832 506 824 L574 787 Q587 779 574 771 L506 734 Q492 726 492 742Z" fill="#111315"/>
    <path d="M698 752 H748 Q757 752 757 761 V811 Q757 820 748 820 H698 Q689 820 689 811 V761 Q689 752 698 752Z" fill="#111315"/>
  </g>
